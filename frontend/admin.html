<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartLeave - Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">SmartLeave</div>
        <div class="items-center flex">
            <span class="navbar-user" id="userName">Administrator</span>
            <button class="btn-logout" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="container">
        <div class="dashboard-header">
            <h1 class="dashboard-title">Admin Dashboard</h1>
        </div>

        <!-- All Requests -->
        <div class="card">
            <h2 class="card-title">All Leave Requests</h2>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Student</th>
                            <th>Type</th>
                            <th>Dates</th>
                            <th>Reason</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="allRequestsTable">
                        <tr><td colspan="6" class="text-center">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- User Management -->
        <div class="card">
            <div class="flex justify-between items-center mb-2">
                <h2 class="card-title" style="margin:0;">User Management</h2>
                <button class="btn btn-primary btn-sm" onclick="toggleUserForm()">+ Add User</button>
            </div>
            
            <div id="addUserFormContainer" class="hidden mb-2" style="padding: 1rem; border: 1px solid var(--border); border-radius: 8px; background: #F9FAFB;">
                <h3 style="margin-bottom: 1rem; font-size: 1rem;">Create New User</h3>
                <form id="addUserForm">
                    <div class="flex gap-2 mb-1">
                        <div style="flex:1" class="form-group mb-1">
                            <label>Name</label>
                            <input type="text" id="newName" class="form-control" required>
                        </div>
                        <div style="flex:1" class="form-group mb-1">
                            <label>Email</label>
                            <input type="email" id="newEmail" class="form-control" required>
                        </div>
                    </div>
                    <div class="flex gap-2 mb-1">
                        <div style="flex:1" class="form-group mb-1">
                            <label>Password</label>
                            <input type="password" id="newPassword" class="form-control" required>
                        </div>
                        <div style="flex:1" class="form-group mb-1">
                            <label>Role</label>
                            <select id="newRole" class="form-control" required>
                                <option value="student">Student</option>
                                <option value="faculty">Faculty</option>
                                <option value="hod">HOD</option>
                                <option value="admin">Admin</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-success btn-sm">Save User</button>
                    <button type="button" class="btn btn-sm" style="background:#E5E7EB;" onclick="toggleUserForm()">Cancel</button>
                </form>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Role</th>
                            <th>Joined</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="usersTable">
                        <tr><td colspan="5" class="text-center">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
