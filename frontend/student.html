<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartLeave - Student Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">SmartLeave</div>
        <div class="items-center flex">
            <span class="navbar-user" id="userName">Student</span>
            <button class="btn-logout" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="container">
        <div class="dashboard-header">
            <h1 class="dashboard-title">Student Dashboard</h1>
            <button class="btn btn-primary" onclick="toggleForm()">Apply for Leave</button>
        </div>

        <div class="card hidden" id="applyFormCard">
            <h2 class="card-title">New Leave Request</h2>
            <div id="applyAlert" class="alert alert-error"></div>
            <form id="applyForm">
                <div class="form-group">
                    <label>Leave Type</label>
                    <select id="type" class="form-control" required>
                        <option value="Sick Leave">Sick Leave</option>
                        <option value="Casual Leave">Casual Leave</option>
                        <option value="Emergency Leave">Emergency Leave</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="form-group flex gap-2">
                    <div style="flex:1">
                        <label>Start Date</label>
                        <input type="date" id="startDate" class="form-control" required>
                    </div>
                    <div style="flex:1">
                        <label>End Date</label>
                        <input type="date" id="endDate" class="form-control" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Reason</label>
                    <textarea id="reason" class="form-control" required placeholder="Please provide specific details..."></textarea>
                </div>
                <div class="flex gap-2">
                    <button type="submit" class="btn btn-primary">Submit Request</button>
                    <button type="button" class="btn btn-danger" onclick="toggleForm()">Cancel</button>
                </div>
            </form>
        </div>

        <div class="card">
            <h2 class="card-title">My Leave History</h2>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Type</th>
                            <th>Dates</th>
                            <th>Reason</th>
                            <th>Status</th>
                            <th>Applied On</th>
                        </tr>
                    </thead>
                    <tbody id="leaveHistoryTable">
                        <tr><td colspan="5" class="text-center">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/student.js"></script>
</body>
</html>
