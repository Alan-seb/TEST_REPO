<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartLeave - Faculty Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">SmartLeave</div>
        <div class="items-center flex">
            <span class="navbar-user" id="userName">Faculty Member</span>
            <button class="btn-logout" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="container">
        <div class="dashboard-header">
            <h1 class="dashboard-title">Faculty Dashboard</h1>
        </div>

        <div class="card">
            <h2 class="card-title">Pending Leave Requests</h2>
            <div id="actionAlert" class="alert hidden"></div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Student</th>
                            <th>Type</th>
                            <th>Dates</th>
                            <th>Reason</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="pendingRequestsTable">
                        <tr><td colspan="5" class="text-center">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Review Modal (using prompt() in JS to keep it simple, but we can just use prompt for comments) -->

    <script src="js/api.js"></script>
    <script src="js/faculty.js"></script>
</body>
</html>
